name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run pytest

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Run migrations in container
        run: docker compose exec -T api alembic upgrade head

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent http://localhost:8000/healthz; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Show compose status on failure
        if: failure()
        run: docker compose ps && docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
