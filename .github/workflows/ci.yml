name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run pytest

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    env:
      FAMILY_LEDGER_IMAGE: family-ledger:test
      POSTGRES_PASSWORD: family_ledger_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t "$FAMILY_LEDGER_IMAGE" .

      - name: Start stack from built image
        run: docker compose -f docker/compose/docker-compose.yml --env-file docker/compose/.env.example up -d

      - name: Run migrations in container
        run: docker compose -f docker/compose/docker-compose.yml --env-file docker/compose/.env.example exec -T api alembic upgrade head

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent http://localhost:8000/healthz; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Show compose status on failure
        if: failure()
        run: docker compose -f docker/compose/docker-compose.yml --env-file docker/compose/.env.example ps && docker compose -f docker/compose/docker-compose.yml --env-file docker/compose/.env.example logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose -f docker/compose/docker-compose.yml --env-file docker/compose/.env.example down -v

  docker-publish:
    runs-on: ubuntu-latest
    needs: docker-smoke
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
