name: Google Sheets Client

on:
  push:
    branches: [main]
    paths:
      - 'clients/google-sheets/**'
      - '.github/workflows/google-sheets.yml'
  pull_request:
    paths:
      - 'clients/google-sheets/**'
      - '.github/workflows/google-sheets.yml'

jobs:
  google-sheets-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/google-sheets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/google-sheets/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
