name: Mobile Client

on:
  push:
    branches: [main]
    paths:
      - 'clients/mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'clients/mobile/**'
      - '.github/workflows/mobile.yml'

jobs:
  mobile-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('clients/mobile/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          LINES=$(grep -c "^DA:" coverage/lcov.info || echo 0)
          COVERED=$(grep -c "^DA:.*,[^0]" coverage/lcov.info || echo 0)
          if [ "$LINES" -gt 0 ]; then
            PCT=$(( COVERED * 100 / LINES ))
            echo "Coverage: $COVERED/$LINES lines ($PCT%)"
            if [ "$PCT" -lt 60 ]; then
              echo "Coverage below 60% threshold"
              exit 1
            fi
          fi

      - name: Build Android (debug)
        run: flutter build apk --debug
