<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #202124;
    background: #fff;
    padding: 16px;
  }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 4px;
  }

  input[type="text"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 13px;
    color: #202124;
    background: #fff;
  }

  .hint {
    margin-top: 4px;
    color: #5f6368;
    font-size: 12px;
  }

  .actions { margin-top: 20px; display: flex; gap: 8px; align-items: center; }

  .btn-primary {
    padding: 8px 20px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-primary:hover:not(:disabled) { background: #1557b0; }
  .btn-primary:disabled { background: #dadce0; color: #80868b; cursor: default; }

  .btn-secondary {
    padding: 8px 16px;
    background: #fff;
    color: #1a73e8;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-secondary:hover { background: #f1f3f4; }

  #errorBox {
    display: none;
    padding: 8px 12px;
    background: #fce8e6;
    border: 1px solid #f28b82;
    border-radius: 4px;
    color: #c5221f;
    margin-bottom: 12px;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="errorBox"></div>

<div class="field">
  <label for="urlInput">URL</label>
  <input type="text" id="urlInput" placeholder="https://your-server:8000" />
  <div class="hint">Example: https://xyz.ts.net:8000</div>
</div>

<div class="field">
  <label for="tokenInput">Token</label>
  <input type="text" id="tokenInput" placeholder="Bearer token configured on the server" />
  <div class="hint">Example: your-long-random-token</div>
</div>

<div class="actions">
  <button class="btn-primary" id="saveBtn" onclick="onSave()">Save</button>
  <button class="btn-secondary" onclick="google.script.host.close()">Cancel</button>
</div>

<script>
  google.script.run
    .withSuccessHandler(function(settings) {
      if (settings.baseUrl) { document.getElementById('urlInput').value = settings.baseUrl; }
      if (settings.apiToken) { document.getElementById('tokenInput').value = settings.apiToken; }
    })
    .getApiSettingsForDialog();

  function onSave() {
    var url = document.getElementById('urlInput').value.trim();
    var token = document.getElementById('tokenInput').value.trim();
    var errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';

    if (!url) { showError('URL is required.'); return; }
    if (!token) { showError('Token is required.'); return; }

    document.getElementById('saveBtn').disabled = true;
    google.script.run
      .withSuccessHandler(function() { google.script.host.close(); })
      .withFailureHandler(function(err) {
        showError(err.message || String(err));
        document.getElementById('saveBtn').disabled = false;
      })
      .saveApiSettingsFromDialog(url, token);
  }

  function showError(msg) {
    var errorBox = document.getElementById('errorBox');
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }
</script>
</body>
</html>
