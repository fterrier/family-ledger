<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 12px 16px;
      color: #3c4043;
      margin: 0;
    }
    .section { margin-bottom: 16px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #80868b;
      margin-bottom: 8px;
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .btn {
      padding: 5px 14px;
      border: 1px solid #dadce0;
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #3c4043;
    }
    .btn:hover:not(:disabled) { background: #f8f9fa; border-color: #bdc1c6; }
    .btn.selected { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .btn.selected:hover:not(:disabled) { background: #1765cc; border-color: #1765cc; }
    .btn:disabled { opacity: 0.38; cursor: default; }
    .month-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .month-grid .btn {
      padding: 5px 0;
      text-align: center;
      border-radius: 4px;
    }
    .divider { border: none; border-top: 1px solid #e8eaed; margin: 4px 0 12px; }
    .clear-btn {
      width: 100%;
      padding: 8px;
      background: #f8f9fa;
      border: 1px solid #dadce0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #3c4043;
    }
    .clear-btn:hover { background: #e8eaed; }
    .status {
      font-size: 11px;
      color: #80868b;
      margin-top: 10px;
      min-height: 14px;
    }
    .status.error { color: #d93025; }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-label">Year</div>
    <div id="years" class="btn-group">
      <span style="color:#80868b;font-size:12px">Loading&#8230;</span>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-label">Month</div>
    <div class="month-grid" id="months"></div>
  </div>

  <button class="clear-btn" onclick="clearFilter()">Clear filter</button>
  <div id="status" class="status"></div>

  <script>
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var selectedYear = null;
    var selectedMonth = null;

    // Build month grid (all disabled initially).
    var monthsEl = document.getElementById('months');
    MONTHS.forEach(function(label, i) {
      var btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = label;
      btn.disabled = true;
      btn.dataset.month = String(i + 1);
      btn.onclick = function() { onMonthClick(i + 1); };
      monthsEl.appendChild(btn);
    });

    google.script.run
      .withSuccessHandler(function(years) {
        var yearsEl = document.getElementById('years');
        yearsEl.innerHTML = '';
        if (!years || !years.length) {
          yearsEl.innerHTML = '<span style="color:#80868b;font-size:12px">No transactions found.</span>';
          return;
        }
        years.forEach(function(year) {
          var btn = document.createElement('button');
          btn.className = 'btn';
          btn.textContent = String(year);
          btn.dataset.year = String(year);
          btn.onclick = function() { onYearClick(year); };
          yearsEl.appendChild(btn);
        });
      })
      .withFailureHandler(showError)
      .getTransactionFilterYears();

    function onYearClick(year) {
      selectedYear = year;
      selectedMonth = null;
      document.querySelectorAll('#years .btn').forEach(function(b) {
        b.classList.toggle('selected', Number(b.dataset.year) === year);
      });
      document.querySelectorAll('#months .btn').forEach(function(b) {
        b.disabled = false;
        b.classList.remove('selected');
      });
      runFilter();
    }

    function onMonthClick(month) {
      if (!selectedYear) return;
      selectedMonth = (selectedMonth === month) ? null : month;
      document.querySelectorAll('#months .btn').forEach(function(b) {
        b.classList.toggle('selected', Number(b.dataset.month) === selectedMonth);
      });
      runFilter();
    }

    function runFilter() {
      setStatus('Applying…', false);
      google.script.run
        .withSuccessHandler(function() { setStatus('', false); })
        .withFailureHandler(showError)
        .applyTransactionQuickFilter(selectedYear, selectedMonth || null);
    }

    function clearFilter() {
      selectedYear = null;
      selectedMonth = null;
      document.querySelectorAll('#years .btn').forEach(function(b) { b.classList.remove('selected'); });
      document.querySelectorAll('#months .btn').forEach(function(b) {
        b.classList.remove('selected');
        b.disabled = true;
      });
      setStatus('Clearing…', false);
      google.script.run
        .withSuccessHandler(function() { setStatus('', false); })
        .withFailureHandler(showError)
        .clearTransactionQuickFilter();
    }

    function setStatus(msg, isError) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isError ? ' error' : '');
    }

    function showError(err) {
      setStatus(err && err.message ? err.message : String(err), true);
    }
  </script>
</body>
</html>
