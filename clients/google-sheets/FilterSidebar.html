<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 12px 16px;
      color: #3c4043;
      margin: 0;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #80868b;
      margin-bottom: 8px;
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .btn {
      padding: 5px 12px;
      border: 1px solid #dadce0;
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #3c4043;
    }
    .btn:hover { background: #f8f9fa; border-color: #bdc1c6; }
    .btn.selected { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .btn.selected:hover { background: #1765cc; border-color: #1765cc; }
    .divider { border: none; border-top: 1px solid #e8eaed; margin: 4px 0 14px; }
    .range-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .range-col { flex: 1; min-width: 0; }
    .month-input {
      width: 100%;
      min-width: 0;
      padding: 5px 4px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12px;
      color: #3c4043;
      background: #fff;
      cursor: pointer;
    }
    .month-input:focus { outline: none; border-color: #1a73e8; }
    /* Hide the "---- --" placeholder text when empty; keep the calendar icon. */
    .month-input.empty::-webkit-datetime-edit { color: transparent; }
    .clear-btn {
      width: 100%;
      padding: 8px;
      background: #f8f9fa;
      border: 1px solid #dadce0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #3c4043;
    }
    .clear-btn:hover { background: #e8eaed; }
    .status {
      font-size: 11px;
      color: #80868b;
      margin-top: 8px;
      min-height: 14px;
    }
    .status.error { color: #d93025; }
  </style>
</head>
<body>
  <div class="section-label">Year</div>
  <div id="years" class="btn-group">
    <span style="color:#80868b;font-size:12px">Loading&#8230;</span>
  </div>

  <hr class="divider">

  <div class="section-label">Custom range</div>
  <div class="range-row">
    <div class="range-col">
      <div class="section-label">From</div>
      <input type="month" id="fromInput" class="month-input empty">
    </div>
    <div class="range-col">
      <div class="section-label">To</div>
      <input type="month" id="toInput" class="month-input empty">
    </div>
  </div>

  <button class="clear-btn" onclick="clearFilter()">Clear</button>
  <div id="status" class="status"></div>

  <script>
    var fromInput = document.getElementById('fromInput');
    var toInput = document.getElementById('toInput');

    // Track year button range state.
    var years = [];      // ascending list from server
    var fromYear = null; // integer or null
    var toYear = null;   // integer or null

    // Load years from server (ascending).
    google.script.run
      .withSuccessHandler(function(loadedYears) {
        years = (loadedYears || []).slice().reverse(); // display ascending
        var yearsEl = document.getElementById('years');
        yearsEl.innerHTML = '';
        if (!years.length) {
          yearsEl.innerHTML = '<span style="color:#80868b;font-size:12px">No transactions found.</span>';
          return;
        }
        years.forEach(function(year) {
          var btn = document.createElement('button');
          btn.className = 'btn';
          btn.textContent = String(year);
          btn.dataset.year = String(year);
          btn.onclick = function() { onYearClick(year); };
          yearsEl.appendChild(btn);
        });
      })
      .withFailureHandler(showError)
      .getTransactionFilterYears();

    // --- Year button logic ---

    function onYearClick(year) {
      if (fromYear === null) {
        // Nothing selected: start selection.
        fromYear = toYear = year;
      } else if (year === fromYear && year === toYear) {
        // Only year in range: clicking it deselects.
        fromYear = toYear = null;
      } else if (year === fromYear) {
        // Clicking start of range: advance start to next button year.
        var idx = years.indexOf(year);
        var next = (idx >= 0 && idx + 1 < years.length) ? years[idx + 1] : null;
        if (next !== null && next <= toYear) {
          fromYear = next;
        } else {
          fromYear = toYear = null;
        }
      } else if (year === toYear) {
        // Clicking end of range: retreat end to previous button year.
        var idx = years.indexOf(year);
        var prev = (idx > 0) ? years[idx - 1] : null;
        if (prev !== null && prev >= fromYear) {
          toYear = prev;
        } else {
          fromYear = toYear = null;
        }
      } else if (year < fromYear || year > toYear) {
        // Outside range: extend it.
        if (year < fromYear) fromYear = year;
        else toYear = year;
      } else {
        // Inside range: restart as single selection.
        fromYear = toYear = year;
      }

      syncYearButtons();
      if (fromYear !== null) {
        var from = fromYear + '-01';
        var to = toYear + '-12';
        setInputValue(fromInput, from);
        setInputValue(toInput, to);
        runFilter(from, to);
      } else {
        setInputValue(fromInput, '');
        setInputValue(toInput, '');
        clearServerFilter();
      }
    }

    function syncYearButtons() {
      document.querySelectorAll('#years .btn').forEach(function(b) {
        var y = Number(b.dataset.year);
        b.classList.toggle('selected', fromYear !== null && y >= fromYear && y <= toYear);
      });
    }

    // --- Custom range inputs (auto-apply on committed change) ---

    fromInput.addEventListener('change', onRangeChange);
    toInput.addEventListener('change', onRangeChange);

    // Clear year button highlight while user is editing the inputs.
    fromInput.addEventListener('input', function() {
      syncInputClass(fromInput);
      fromYear = toYear = null;
      syncYearButtons();
    });
    toInput.addEventListener('input', function() {
      syncInputClass(toInput);
      fromYear = toYear = null;
      syncYearButtons();
    });

    function onRangeChange() {
      syncInputClass(fromInput);
      syncInputClass(toInput);
      var from = fromInput.value;
      var to = toInput.value;
      if (!from || !to) return; // wait until both are set
      if (from > to) {
        setStatus('"From" must not be after "To".', true);
        return;
      }
      // Re-sync year buttons if range matches buttons.
      fromYear = parseInt(from.split('-')[0], 10);
      toYear = parseInt(to.split('-')[0], 10);
      syncYearButtons();
      runFilter(from, to);
    }

    // --- Filter actions ---

    function runFilter(from, to) {
      setStatus('Applying…', false);
      google.script.run
        .withSuccessHandler(function() { setStatus('', false); })
        .withFailureHandler(showError)
        .applyTransactionQuickFilter(from, to);
    }

    function clearServerFilter() {
      setStatus('Clearing…', false);
      google.script.run
        .withSuccessHandler(function() { setStatus('', false); })
        .withFailureHandler(showError)
        .clearTransactionQuickFilter();
    }

    function clearFilter() {
      fromYear = toYear = null;
      setInputValue(fromInput, '');
      setInputValue(toInput, '');
      syncYearButtons();
      clearServerFilter();
    }

    // --- Helpers ---

    function setInputValue(input, value) {
      input.value = value;
      syncInputClass(input);
    }

    function syncInputClass(input) {
      input.classList.toggle('empty', !input.value);
    }

    function setStatus(msg, isError) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isError ? ' error' : '');
    }

    function showError(err) {
      setStatus(err && err.message ? err.message : String(err), true);
    }
  </script>
</body>
</html>
