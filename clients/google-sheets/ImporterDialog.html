<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<? var isImportMode = mode === 'import'; ?>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #202124;
    background: #fff;
    padding: 16px;
  }

  .section { margin-bottom: 16px; }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 4px;
  }

  select,
  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 13px;
    color: #202124;
    background: #fff;
  }

  select:disabled,
  input[type="text"]:disabled,
  input[type="number"]:disabled {
    background: #f1f3f4;
    color: #80868b;
  }

  input[readonly] {
    background: #f1f3f4;
    color: #5f6368;
    cursor: default;
  }

  .loading-message {
    color: #5f6368;
  }

  .config-note {
    color: #5f6368;
    font-style: italic;
  }

  .config-field { margin-bottom: 10px; }

  .config-description {
    margin-top: 4px;
    color: #5f6368;
    font-size: 12px;
  }

  .actions { margin-top: 20px; display: flex; gap: 8px; align-items: center; }

  .btn-primary {
    padding: 8px 20px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    font-weight: bold;
  }

  .btn-primary:hover:not(:disabled) { background: #1557b0; }

  .btn-primary:disabled {
    background: #dadce0;
    color: #80868b;
    cursor: default;
  }

  .btn-secondary {
    padding: 8px 16px;
    background: #fff;
    color: #1a73e8;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-secondary:hover { background: #f1f3f4; }

  #errorBox {
    display: none;
    padding: 8px 12px;
    background: #fce8e6;
    border: 1px solid #f28b82;
    border-radius: 4px;
    color: #c5221f;
    margin-bottom: 12px;
    font-size: 12px;
  }

  .kv-list { display: flex; flex-direction: column; gap: 6px; }
  .kv-row { display: flex; gap: 6px; align-items: center; }
  .kv-row input[type="text"] { width: 140px; flex-shrink: 0; }
  .kv-row select { flex: 1; min-width: 0; }

  .kv-remove {
    padding: 3px 8px;
    background: none;
    border: 1px solid #dadce0;
    border-radius: 4px;
    cursor: pointer;
    color: #80868b;
    font-size: 13px;
    flex-shrink: 0;
  }

  .kv-remove:hover {
    background: #fce8e6;
    border-color: #f28b82;
    color: #c5221f;
  }

  .kv-add {
    margin-top: 2px;
    padding: 5px 10px;
    background: #fff;
    color: #1a73e8;
    border: 1px dashed #1a73e8;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    width: 100%;
  }

  .kv-add:hover { background: #e8f0fe; }

  .config-header {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  .config-header label { margin-bottom: 0; }

  .hint {
    margin-top: 4px;
    color: #5f6368;
    font-size: 12px;
  }

  .file-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .file-label-btn {
    display: inline-block;
    padding: 6px 12px;
    background: #f1f3f4;
    border: 1px solid #dadce0;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    font-size: 13px;
  }

  .file-label-btn:hover { background: #e8eaed; }

  #fileInputsSection input[type=file] { display: none; }

  #fileName {
    color: #5f6368;
    font-style: italic;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .result-title {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 12px;
    color: #137333;
  }

  .entity-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12px;
    font-size: 12px;
  }

  .entity-table th {
    text-align: left;
    color: #5f6368;
    font-weight: normal;
    padding: 3px 6px 3px 0;
    border-bottom: 1px solid #dadce0;
  }

  .entity-table td {
    padding: 4px 6px 4px 0;
    vertical-align: top;
  }

  .entity-table td:not(:first-child) { text-align: right; padding-right: 12px; }
  .entity-table th:not(:first-child) { text-align: right; padding-right: 12px; }

  .error-count { color: #c5221f; }

  .error-examples {
    list-style: none;
    margin: 2px 0 0 0;
    padding: 0;
  }

  .error-examples li {
    font-size: 11px;
    color: #c5221f;
    padding: 1px 0;
  }

  .warnings-section { margin-top: 8px; }

  .warnings-title {
    font-weight: bold;
    color: #e37400;
    margin-bottom: 4px;
  }

  .warnings-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .warnings-list li {
    font-size: 12px;
    color: #e37400;
    padding: 2px 0;
  }

  .warnings-list li::before { content: '• '; }
</style>
</head>
<body>

<div id="phaseLoading">
  <p id="loadingMsg" class="loading-message">Loading importers...</p>
</div>

<div id="phaseForm" style="display:none">
  <div id="errorBox"></div>

  <div class="section">
    <label for="importerSelect">Importer</label>
    <select id="importerSelect"></select>
  </div>

  <div class="section" id="configSection">
    <div class="config-header">
      <label>Configuration</label>
    </div>
    <? if (!isImportMode) { ?>
      <div class="hint">Blank fields stay unset and keep the importer default behavior.</div>
    <? } ?>
    <div id="configFields" style="margin-top:8px"></div>
  </div>

  <? if (isImportMode) { ?>
    <div class="section" id="fileInputsSection"></div>
  <? } ?>

  <div class="actions">
    <button class="btn-primary" id="submitBtn" <? if (isImportMode) { ?>disabled<? } ?> onclick="onSubmitImporterDialog()">
      <?!= isImportMode ? 'Import' : 'Save' ?>
    </button>
    <? if (isImportMode) { ?>
      <span id="submitStatus" style="color:#5f6368;font-size:12px;display:none"></span>
    <? } else { ?>
      <button class="btn-secondary" onclick="google.script.host.close()">Cancel</button>
    <? } ?>
  </div>
</div>

<? if (isImportMode) { ?>
  <div id="phaseResult" style="display:none">
    <p class="result-title">Import complete</p>
    <table class="entity-table" id="entityTable">
      <thead>
        <tr>
          <th>Entity</th>
          <th>Created</th>
          <th>Duplicate</th>
          <th>Errors</th>
        </tr>
      </thead>
      <tbody id="entityBody"></tbody>
    </table>
    <div id="warningsSection" class="warnings-section" style="display:none">
      <p class="warnings-title">Warnings</p>
      <ul class="warnings-list" id="warningsList"></ul>
    </div>
    <div class="actions" style="margin-top:16px">
      <button class="btn-secondary" onclick="onImportAnother()">Import another file</button>
    </div>
  </div>
<? } ?>

<script>
  var IMPORTER_DIALOG_MODE = <?!= JSON.stringify(mode) ?>;
  var importers = [];
  var currentImporter = null;
  var accountsCache = null;
  var pendingFiles = {};

  function isImportMode_() {
    return IMPORTER_DIALOG_MODE === 'import';
  }

  function allowUnsetImporterValues_() {
    return !isImportMode_();
  }

  function getImporterSchemaKeys_(schema) {
    return Object.keys((schema && schema.properties) || {});
  }

  function getImporterSchemaProperty_(schema, key) {
    return ((schema && schema.properties) || {})[key] || {};
  }

  function getImporterFieldLabel_(schema, key) {
    var prop = getImporterSchemaProperty_(schema, key);
    return prop.title || key;
  }

  function getImporterFieldDescription_(schema, key) {
    var prop = getImporterSchemaProperty_(schema, key);
    return prop.description || '';
  }

  function importerSchemaNeedsAccounts_(schema) {
    return getImporterSchemaKeys_(schema).some(function(key) {
      var prop = getImporterSchemaProperty_(schema, key);
      if (prop['x-resource-type'] === 'account') {
        return true;
      }
      var valProp = prop.additionalProperties || {};
      return prop.type === 'object' && valProp['x-resource-type'] === 'account';
    });
  }

  function getImporterStoredConfigValue_(importer, key) {
    var config = (importer && importer.config) || {};
    if (Object.prototype.hasOwnProperty.call(config, key)) {
      return config[key];
    }
    return undefined;
  }

  function getImporterEffectiveConfigValue_(importer, key) {
    var storedValue = getImporterStoredConfigValue_(importer, key);
    if (storedValue !== undefined) {
      return storedValue;
    }
    var prop = getImporterSchemaProperty_((importer && importer.schema) || {}, key);
    if (Object.prototype.hasOwnProperty.call(prop, 'default')) {
      return prop.default;
    }
    return undefined;
  }

  function getDisplayedImporterConfigValue_(importer, key) {
    if (isImportMode_()) {
      return getImporterEffectiveConfigValue_(importer, key);
    }
    return getImporterStoredConfigValue_(importer, key);
  }

  function appendBlankImporterSelectOption_(doc, select, label) {
    var option = doc.createElement('option');
    option.value = '';
    option.textContent = label;
    select.appendChild(option);
  }

  function appendImporterEnumOption_(doc, select, value) {
    var option = doc.createElement('option');
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  }

  function appendImporterAccountOptions_(doc, select, accountOptions) {
    accountOptions.forEach(function(account) {
      var option = doc.createElement('option');
      option.value = account.name;
      option.textContent = account.display_name || account.name;
      select.appendChild(option);
    });
  }

  function buildImporterConfigKvRow_(doc, prop, initKey, initValue, accountOptions) {
    var row = doc.createElement('div');
    row.className = 'kv-row';

    var keyInput = doc.createElement('input');
    keyInput.type = 'text';
    keyInput.className = 'kv-key';
    keyInput.placeholder = 'Key';
    keyInput.value = initKey || '';
    row.appendChild(keyInput);

    var valProp = prop.additionalProperties || {};
    var valueEl;
    if (valProp['x-resource-type'] === 'account') {
      valueEl = doc.createElement('select');
      valueEl.className = 'kv-value';
      appendBlankImporterSelectOption_(doc, valueEl, '— select account —');
      appendImporterAccountOptions_(doc, valueEl, accountOptions || []);
      valueEl.value = initValue || '';
    } else {
      valueEl = doc.createElement('input');
      valueEl.type = 'text';
      valueEl.className = 'kv-value';
      valueEl.placeholder = 'Value';
      valueEl.value = initValue || '';
    }
    row.appendChild(valueEl);

    var removeBtn = doc.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'kv-remove';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', function() {
      row.parentNode.removeChild(row);
    });
    row.appendChild(removeBtn);
    return row;
  }

  function buildImporterConfigKvListElement_(doc, key, prop, value, accountOptions) {
    var container = doc.createElement('div');
    container.className = 'kv-list';
    container.setAttribute('data-field', key);

    var addBtn = doc.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'kv-add';
    addBtn.textContent = '+ Add mapping';
    addBtn.addEventListener('click', function() {
      container.insertBefore(buildImporterConfigKvRow_(doc, prop, '', '', accountOptions), addBtn);
    });
    container.appendChild(addBtn);

    var entries = (value && typeof value === 'object')
      ? Object.keys(value).map(function(entryKey) { return [entryKey, value[entryKey]]; })
      : [];
    if (entries.length === 0) {
      container.insertBefore(buildImporterConfigKvRow_(doc, prop, '', '', accountOptions), addBtn);
    } else {
      entries.forEach(function(entry) {
        container.insertBefore(buildImporterConfigKvRow_(doc, prop, entry[0], entry[1], accountOptions), addBtn);
      });
    }
    return container;
  }

  function buildImporterConfigFieldElement_(key, prop, value, accountOptions, options) {
    var doc = (options && options.document) || document;
    var element;

    if (prop.type === 'object' && prop.additionalProperties) {
      return buildImporterConfigKvListElement_(doc, key, prop, value, accountOptions || []);
    }
    if (prop['x-resource-type'] === 'account') {
      element = doc.createElement('select');
      appendBlankImporterSelectOption_(doc, element, '— select account —');
      appendImporterAccountOptions_(doc, element, accountOptions || []);
      element.value = value || '';
    } else if (prop.type === 'boolean' && options && options.allowUnsetBoolean) {
      element = doc.createElement('select');
      appendBlankImporterSelectOption_(doc, element, 'Use default');
      appendImporterEnumOption_(doc, element, 'true');
      appendImporterEnumOption_(doc, element, 'false');
      element.value = value === true ? 'true' : (value === false ? 'false' : '');
    } else if (Array.isArray(prop.enum)) {
      element = doc.createElement('select');
      appendBlankImporterSelectOption_(doc, element, '— select —');
      prop.enum.forEach(function(optionValue) {
        appendImporterEnumOption_(doc, element, String(optionValue));
      });
      element.value = value !== undefined && value !== null ? String(value) : '';
    } else if (prop.type === 'boolean') {
      element = doc.createElement('input');
      element.type = 'checkbox';
      element.checked = value === true;
    } else {
      element = doc.createElement('input');
      element.type = prop.type === 'number' || prop.type === 'integer' ? 'number' : 'text';
      if (prop.type === 'integer') {
        element.step = '1';
      } else if (prop.type === 'number') {
        element.step = 'any';
      }
      element.value = value !== undefined && value !== null ? String(value) : '';
    }

    element.name = key;
    return element;
  }

  function readImporterConfigFieldValue_(root, key, prop, options) {
    if (prop.type === 'object' && prop.additionalProperties) {
      var container = root.querySelector('[data-field="' + key + '"]');
      if (!container) {
        return undefined;
      }
      var result = {};
      var rows = container.querySelectorAll('.kv-row');
      for (var i = 0; i < rows.length; i++) {
        var keyEl = rows[i].querySelector('.kv-key');
        var valEl = rows[i].querySelector('.kv-value');
        var rowKey = keyEl ? keyEl.value.trim() : '';
        var rowValue = valEl ? String(valEl.value || '').trim() : '';
        if (rowKey && rowValue) {
          result[rowKey] = rowValue;
        }
      }
      return Object.keys(result).length > 0 ? result : undefined;
    }

    var el = root.querySelector('[name="' + key + '"]');
    if (!el) {
      return undefined;
    }
    if (prop.type === 'boolean' && options && options.allowUnsetBoolean) {
      if (el.value === '') {
        return undefined;
      }
      return el.value === 'true';
    }
    if (prop.type === 'boolean') {
      return !!el.checked;
    }
    if (prop.type === 'integer') {
      if (el.value === '') {
        return undefined;
      }
      return parseInt(el.value, 10);
    }
    if (prop.type === 'number') {
      if (el.value === '') {
        return undefined;
      }
      return Number(el.value);
    }
    if (el.value === '') {
      return undefined;
    }
    return el.value;
  }

  function importerConfigValuesEqual_(left, right) {
    if (left === right) {
      return true;
    }
    if (left === undefined || right === undefined || left === null || right === null) {
      return false;
    }
    if (Array.isArray(left) || Array.isArray(right)) {
      if (!Array.isArray(left) || !Array.isArray(right) || left.length !== right.length) {
        return false;
      }
      for (var i = 0; i < left.length; i++) {
        if (!importerConfigValuesEqual_(left[i], right[i])) {
          return false;
        }
      }
      return true;
    }
    if (typeof left === 'object' && typeof right === 'object') {
      var leftKeys = Object.keys(left);
      var rightKeys = Object.keys(right);
      if (leftKeys.length !== rightKeys.length) {
        return false;
      }
      for (var keyIndex = 0; keyIndex < leftKeys.length; keyIndex++) {
        var key = leftKeys[keyIndex];
        if (!Object.prototype.hasOwnProperty.call(right, key)) {
          return false;
        }
        if (!importerConfigValuesEqual_(left[key], right[key])) {
          return false;
        }
      }
      return true;
    }
    return false;
  }

  function buildImporterConfigOverride_(root, importer, options) {
    var override = {};
    getImporterSchemaKeys_((importer && importer.schema) || {}).forEach(function(key) {
      var prop = getImporterSchemaProperty_(importer.schema || {}, key);
      var value = readImporterConfigFieldValue_(root, key, prop, options || {});
      if (value === undefined) {
        return;
      }
      if (importerConfigValuesEqual_(value, getImporterEffectiveConfigValue_(importer, key))) {
        return;
      }
      override[key] = value;
    });
    return Object.keys(override).length > 0 ? override : null;
  }

  function renderImporterConfigForm_(container, importer, accountOptions, valueResolver, options) {
    container.innerHTML = '';
    var schema = importer && importer.schema ? importer.schema : {};
    var keys = getImporterSchemaKeys_(schema);
    if (keys.length === 0) {
      var emptyNote = container.ownerDocument.createElement('p');
      emptyNote.className = 'config-note';
      emptyNote.textContent = 'No configuration required.';
      container.appendChild(emptyNote);
      return;
    }
    keys.forEach(function(key) {
      var prop = getImporterSchemaProperty_(schema, key);
      var div = container.ownerDocument.createElement('div');
      div.className = 'config-field';

      var label = container.ownerDocument.createElement('label');
      label.textContent = getImporterFieldLabel_(schema, key);
      div.appendChild(label);

      var fieldEl = buildImporterConfigFieldElement_(
        key,
        prop,
        valueResolver(importer, key),
        accountOptions,
        Object.assign({}, options || {}, { document: container.ownerDocument })
      );
      div.appendChild(fieldEl);

      var description = getImporterFieldDescription_(schema, key);
      if (description) {
        var help = container.ownerDocument.createElement('p');
        help.className = 'config-description';
        help.textContent = description;
        div.appendChild(help);
      }

      container.appendChild(div);

      if (prop['x-resource-type'] === 'account') {
        attachSearchDropdown_(fieldEl, filterAccountOptions_);
      }
    });
  }

  initializeImporterDialog(<?!= initialImportersJson ?>);

  function initializeImporterDialog(initialImporters) {
    try {
      onImportersLoaded({ importers: initialImporters || [] });
    } catch (err) {
      onLoadError(err);
    }
  }

  function onImportersLoaded(response) {
    importers = (response && response.importers) || [];
    document.getElementById('phaseLoading').style.display = 'none';
    if (importers.length === 0) {
      document.getElementById('phaseLoading').style.display = 'block';
      document.getElementById('loadingMsg').textContent = 'No importers are installed.';
      return;
    }
    populateImporterDropdown();
    document.getElementById('phaseForm').style.display = 'block';
    selectImporter(importers[0]);
  }

  function onLoadError(err) {
    var message = err && err.message ? err.message : String(err || 'Unknown error');
    document.getElementById('loadingMsg').textContent = 'Failed to load importers: ' + message;
  }

  function populateImporterDropdown() {
    var select = document.getElementById('importerSelect');
    select.innerHTML = '';
    importers.forEach(function(importer) {
      var option = document.createElement('option');
      option.value = importer.name;
      option.textContent = importer.display_name || importer.plugin_name;
      select.appendChild(option);
    });
    select.addEventListener('change', function() {
      var importer = findImporterByName_(this.value);
      if (importer) {
        selectImporter(importer);
      }
    });
  }

  function findImporterByName_(importerName) {
    return importers.find(function(importer) {
      return importer.name === importerName;
    }) || null;
  }

  function selectImporter(importer) {
    currentImporter = importer;
    document.getElementById('importerSelect').value = importer.name;
    hideError();
    if (isImportMode_()) {
      pendingFiles = {};
      renderFileInputs(importer);
      updateSubmitButton();
    }
    renderConfigForm(importer);
  }

  function renderConfigForm(importer) {
    var container = document.getElementById('configFields');
    try {
      if (importerSchemaNeedsAccounts_(importer.schema || {}) && accountsCache === null) {
        container.innerHTML = '';
        var loadingNote = document.createElement('p');
        loadingNote.className = 'config-note';
        loadingNote.textContent = 'Loading accounts...';
        container.appendChild(loadingNote);
        google.script.run
          .withSuccessHandler(function(accounts) {
            accountsCache = accounts;
            renderConfigForm(importer);
          })
          .withFailureHandler(function() {
            accountsCache = [];
            renderConfigForm(importer);
          })
          .getAccountsForDialog();
        return;
      }

      renderImporterConfigForm_(container, importer, accountsCache || [], getDisplayedImporterConfigValue_, {
        allowUnsetBoolean: allowUnsetImporterValues_(),
      });
    } catch (err) {
      showConfigRenderError(container, err);
    }
  }

  function buildImporterDialogSubmitConfig_() {
    if (isImportMode_()) {
      return buildImporterConfigOverride_(document, currentImporter, {
        allowUnsetBoolean: false,
      });
    }

    var config = {};
    getImporterSchemaKeys_((currentImporter && currentImporter.schema) || {}).forEach(function(key) {
      var prop = getImporterSchemaProperty_(currentImporter.schema || {}, key);
      var value = readImporterConfigFieldValue_(document, key, prop, {
        allowUnsetBoolean: true,
      });
      if (value !== undefined) {
        config[key] = value;
      }
    });
    return config;
  }

  function onSubmitImporterDialog() {
    if (!currentImporter) {
      return;
    }
    if (isImportMode_()) {
      onImport();
      return;
    }
    onSaveImporterSettings();
  }

  <? if (isImportMode) { ?>
  function getFileDescriptors_() {
    var descriptors = (currentImporter && currentImporter.file_descriptors) || [];
    if (!descriptors.length) {
      return [{ name: 'file', label: 'File', description: '', accept: [], required: true }];
    }
    return descriptors;
  }

  function updateSubmitButton() {
    var descriptors = getFileDescriptors_();
    var allRequired = descriptors.every(function(d) {
      return !d.required || pendingFiles[d.name];
    });
    document.getElementById('submitBtn').disabled = !allRequired;
  }

  function renderFileInputs(importer) {
    var section = document.getElementById('fileInputsSection');
    section.innerHTML = '';
    var descriptors = getFileDescriptors_();
    descriptors.forEach(function(descriptor) {
      var fieldName = descriptor.name;
      var label = descriptor.label || fieldName;
      var description = descriptor.description || '';
      var accept = (descriptor.accept || []).join(',');

      var labelEl = document.createElement('label');
      labelEl.textContent = label + (descriptor.required ? '' : ' (optional)');
      section.appendChild(labelEl);

      var fileRow = document.createElement('div');
      fileRow.className = 'file-row';

      var inputId = 'fileInput_' + fieldName;
      var chooseBtn = document.createElement('label');
      chooseBtn.className = 'file-label-btn';
      chooseBtn.setAttribute('for', inputId);
      chooseBtn.textContent = 'Choose file';
      fileRow.appendChild(chooseBtn);

      var fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.id = inputId;
      if (accept) fileInput.accept = accept;
      fileRow.appendChild(fileInput);

      var fileNameEl = document.createElement('span');
      fileNameEl.id = 'fileName_' + fieldName;
      fileNameEl.textContent = 'No file chosen';
      fileRow.appendChild(fileNameEl);

      section.appendChild(fileRow);

      if (description) {
        var hint = document.createElement('p');
        hint.className = 'config-description';
        hint.textContent = description;
        section.appendChild(hint);
      }

      (function(fn, nameEl) {
        fileInput.addEventListener('change', function() {
          var file = this.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function(e) {
            var dataUrl = e.target.result;
            pendingFiles[fn] = {
              base64: dataUrl.split(',')[1],
              mimeType: file.type || 'application/octet-stream',
              name: file.name,
            };
            nameEl.textContent = file.name;
            updateSubmitButton();
            hideError();
          };
          reader.readAsDataURL(file);
        });
      })(fieldName, fileNameEl);
    });
  }

  function onImport() {
    var descriptors = getFileDescriptors_();
    var hasRequired = descriptors.every(function(d) {
      return !d.required || pendingFiles[d.name];
    });
    if (!hasRequired) return;

    var submitBtn = document.getElementById('submitBtn');
    var importerSelect = document.getElementById('importerSelect');
    var statusEl = document.getElementById('submitStatus');
    var allInputs = document.getElementById('fileInputsSection').querySelectorAll('input[type=file]');

    submitBtn.disabled = true;
    allInputs.forEach(function(el) { el.disabled = true; });
    importerSelect.disabled = true;
    statusEl.textContent = 'Importing file...';
    statusEl.style.display = '';
    hideError();

    google.script.run
      .withSuccessHandler(function(response) {
        var importResult = response.result;
        statusEl.textContent = 'Refreshing sheets...';
        google.script.run
          .withSuccessHandler(function() {
            statusEl.style.display = 'none';
            showResult(importResult);
          })
          .withFailureHandler(function() {
            statusEl.style.display = 'none';
            showResult(importResult);
          })
          .syncLedger();
      })
      .withFailureHandler(function(err) {
        showError(err.message || String(err));
        submitBtn.disabled = false;
        allInputs.forEach(function(el) { el.disabled = false; });
        importerSelect.disabled = false;
        statusEl.style.display = 'none';
      })
      .runImportFromDialog(
        currentImporter.name,
        pendingFiles,
        buildImporterDialogSubmitConfig_()
      );
  }

  function showResult(result) {
    document.getElementById('phaseForm').style.display = 'none';
    document.getElementById('phaseResult').style.display = 'block';

    var tbody = document.getElementById('entityBody');
    tbody.innerHTML = '';
    var entities = result.entities || {};
    Object.keys(entities).forEach(function(type) {
      var counts = entities[type];
      var tr = document.createElement('tr');

      var tdType = document.createElement('td');
      tdType.textContent = type;
      tr.appendChild(tdType);

      var tdCreated = document.createElement('td');
      tdCreated.textContent = counts.created;
      tr.appendChild(tdCreated);

      var tdDup = document.createElement('td');
      tdDup.textContent = counts.duplicate;
      tr.appendChild(tdDup);

      var tdErr = document.createElement('td');
      var errCount = counts.errors && counts.errors.count ? counts.errors.count : 0;
      tdErr.textContent = errCount;
      if (errCount > 0) {
        tdErr.className = 'error-count';
        var examples = counts.errors.examples || [];
        if (examples.length > 0) {
          var ul = document.createElement('ul');
          ul.className = 'error-examples';
          examples.forEach(function(example) {
            var li = document.createElement('li');
            li.textContent = example;
            ul.appendChild(li);
          });
          tdErr.appendChild(ul);
        }
      }
      tr.appendChild(tdErr);
      tbody.appendChild(tr);
    });

    if (Object.keys(entities).length === 0) {
      var tr = document.createElement('tr');
      var td = document.createElement('td');
      td.colSpan = 4;
      td.className = 'config-note';
      td.textContent = 'No entities were imported.';
      tr.appendChild(td);
      tbody.appendChild(tr);
    }

    var warnings = result.warnings || [];
    var warnSection = document.getElementById('warningsSection');
    if (warnings.length > 0) {
      warnSection.style.display = 'block';
      var warnList = document.getElementById('warningsList');
      warnList.innerHTML = '';
      warnings.forEach(function(warning) {
        var li = document.createElement('li');
        li.textContent = warning;
        warnList.appendChild(li);
      });
    } else {
      warnSection.style.display = 'none';
    }
  }

  function onImportAnother() {
    document.getElementById('phaseResult').style.display = 'none';
    document.getElementById('phaseForm').style.display = 'block';
    pendingFiles = {};
    document.getElementById('importerSelect').disabled = false;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitStatus').style.display = 'none';
    hideError();
    if (currentImporter) renderFileInputs(currentImporter);
  }
  <? } else { ?>
  function onSaveImporterSettings() {
    hideError();
    var submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    google.script.run
      .withSuccessHandler(function() {
        google.script.host.close();
      })
      .withFailureHandler(function(err) {
        showError(err.message || String(err));
        submitBtn.disabled = false;
      })
      .saveImporterSettingsFromDialog(
        currentImporter.name,
        buildImporterDialogSubmitConfig_()
      );
  }
  <? } ?>

  function showError(message) {
    var box = document.getElementById('errorBox');
    box.textContent = message;
    box.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorBox').style.display = 'none';
  }

  function showConfigRenderError(container, err) {
    container.innerHTML = '';
    var note = document.createElement('p');
    note.className = 'config-note';
    note.textContent = 'Failed to render importer configuration: ' + (err && err.message ? err.message : String(err || 'Unknown error'));
    container.appendChild(note);
  }
  <?!= includeHtml_('AccountSearch'); ?>
  <?!= includeHtml_('SearchDropdown'); ?>
</script>
