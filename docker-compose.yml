services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_ledger}
      POSTGRES_USER: ${POSTGRES_USER:-family_ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-family_ledger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-family_ledger} -d ${POSTGRES_DB:-family_ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FAMILY_LEDGER_DATABASE_URL: ${FAMILY_LEDGER_DATABASE_URL:-postgresql+psycopg://family_ledger:family_ledger@postgres:5432/family_ledger}
      FAMILY_LEDGER_LEDGER_CONFIG_PATH: ${FAMILY_LEDGER_LEDGER_CONFIG_PATH:-/app/config/ledger.yaml}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
