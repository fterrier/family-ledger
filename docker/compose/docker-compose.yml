services:
  postgres:
    image: docker.io/library/postgres:17
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_ledger}
      POSTGRES_USER: ${POSTGRES_USER:-family_ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-family_ledger}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-family_ledger} -d ${POSTGRES_DB:-family_ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${FAMILY_LEDGER_IMAGE:-ghcr.io/fterrier/family-ledger:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./config/ledger.yaml:/app/config/ledger.yaml:ro
    environment:
      FAMILY_LEDGER_DATABASE_URL: ${FAMILY_LEDGER_DATABASE_URL:-postgresql+psycopg://family_ledger:${POSTGRES_PASSWORD:-family_ledger}@postgres:5432/family_ledger}
      FAMILY_LEDGER_LEDGER_CONFIG_PATH: ${FAMILY_LEDGER_LEDGER_CONFIG_PATH:-/app/config/ledger.yaml}

volumes:
  postgres_data:
