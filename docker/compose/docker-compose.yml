# Docker Compose file for running family-ledger from the Docker Hub.
# This file contains everything family-ledger needs to run.
#
# All compose files for family-ledger configure the service in the following way:
#
# - The API container is (re)started on system boot, if it was running before shutdown.
# - Docker volumes for storing data are managed by Docker.
# - The API listens on port 8000.
#
# To install and update family-ledger with this file, do the following:
#
# - Copy this file as 'docker-compose.yml' and the files 'docker-compose.env'
#   and '.env' into a folder.
# - Run 'docker compose pull'.
# - Run 'docker compose up -d'.
#
# For more extensive installation and update instructions, refer to the
# documentation.
services:
  postgres:
    image: docker.io/library/postgres:17
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_ledger}
      POSTGRES_USER: ${POSTGRES_USER:-family_ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-family_ledger}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-family_ledger} -d ${POSTGRES_DB:-family_ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/fterrier/family-ledger:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      FAMILY_LEDGER_DATABASE_URL: ${FAMILY_LEDGER_DATABASE_URL:-postgresql+psycopg://family_ledger:${POSTGRES_PASSWORD:-family_ledger}@postgres:5432/family_ledger}
      FAMILY_LEDGER_LEDGER_CONFIG_PATH: ${FAMILY_LEDGER_LEDGER_CONFIG_PATH:-/app/config/ledger.yaml}
    env_file: docker-compose.env
    volumes:
      # Uncomment to use a custom ledger config from the host
      # - ./config/ledger.yaml:/app/config/ledger.yaml:ro

volumes:
  postgres_data:
